<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بقالة ستور</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
direction:rtl;
}

.header{
background:#2ecc71;
color:white;
text-align:center;
padding:18px;
font-size:24px;
}

.login{
padding:20px;
}

.login input{
width:100%;
padding:12px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ccc;
}

.login button{
background:#2ecc71;
border:none;
color:white;
padding:12px;
width:100%;
border-radius:8px;
}

.topbar{
display:flex;
gap:10px;
padding:10px;
}

.search{
flex:1;
}

.search input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:12px;
padding:12px;
}

.product{
background:white;
padding:10px;
border-radius:12px;
text-align:center;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.product img{
width:100%;
height:110px;
object-fit:cover;
border-radius:8px;
}

.qty{
display:flex;
justify-content:center;
gap:10px;
margin-top:6px;
}

.qty button{
background:#3498db;
border:none;
color:white;
padding:6px 12px;
border-radius:6px;
}

.nextBtn{
position:fixed;
bottom:20px;
left:20px;
right:20px;
background:#2ecc71;
color:white;
border:none;
padding:14px;
border-radius:10px;
font-size:18px;
}

.orderPage{
display:none;
padding:20px;
}

.orderPage input{
width:100%;
padding:12px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ccc;
}

</style>
</head>

<body>

<div id="loginPage" class="login">

<h2>تسجيل الدخول</h2>

<input id="userName" placeholder="اسمك">

<input id="userPhone" placeholder="رقمك أو ايميلك">

<input id="userPass" placeholder="كلمة السر">

<button onclick="saveUser()">دخول</button>

</div>


<div id="shopPage" style="display:none">

<div class="header">
بقالة ستور
</div>

<div class="topbar">

<div class="search">
<input id="search" placeholder="ابحث عن منتج..." onkeyup="searchProduct()">
</div>

</div>

<div class="products" id="products"></div>

<button class="nextBtn" onclick="goOrder()">
التالي
</button>

</div>


<div id="orderPage" class="orderPage">

<button onclick="goBack()">رجوع</button>

<h3>بيانات الطلب</h3>

<input id="name">
<input id="phone">
<input id="location" placeholder="موقعك">

<h3>الطلبات</h3>

<div id="orderItems"></div>

<h3>الإجمالي: <span id="total"></span> جنيه</h3>

<button onclick="sendOrder()">تأكيد الطلب</button>

</div>


<script>

let savedUser=localStorage.getItem("user")

if(savedUser){

document.getElementById("loginPage").style.display="none"
document.getElementById("shopPage").style.display="block"

}

function saveUser(){

let name=document.getElementById("userName").value
let phone=document.getElementById("userPhone").value
let pass=document.getElementById("userPass").value

let user={
name:name,
phone:phone,
pass:pass
}

localStorage.setItem("user",JSON.stringify(user))

location.reload()

}


let products=[
{name:"سكر",price:1000,img:"https://images.unsplash.com/photo-1586201375761-83865001e31c"},
{name:"أرز",price:67,img:"https://images.unsplash.com/photo-1586201375799-3f2c9e70a5e3"},
{name:"زيت",price:850,img:"https://images.unsplash.com/photo-1604908176997-125f25cc6f3d"},
{name:"مكرونة",price:300,img:"https://images.unsplash.com/photo-1617196037304-0d7d6871f5ed"}
]

let cart={}

function showProducts(){

let html=""

products.forEach((p,i)=>{

html+=`

<div class="product">

<img src="${p.img}">

<h4>${p.name}</h4>

<p>${p.price} جنيه</p>

<div class="qty">

<button onclick="minus(${i})">-</button>

<span id="qty${i}">0</span>

<button onclick="plus(${i})">+</button>

</div>

</div>

`

})

document.getElementById("products").innerHTML=html

}

showProducts()

function plus(i){

if(!cart[i]){
cart[i]={...products[i],qty:0}
}

cart[i].qty++

updateQty()

}

function minus(i){

if(cart[i]){

cart[i].qty--

if(cart[i].qty<=0){
delete cart[i]
}

}

updateQty()

}

function updateQty(){

products.forEach((p,i)=>{

let q=cart[i]?cart[i].qty:0

let el=document.getElementById("qty"+i)

if(el) el.innerText=q

})

}

function goOrder(){

document.getElementById("shopPage").style.display="none"
document.getElementById("orderPage").style.display="block"

let html=""
let total=0

for(let i in cart){

let p=cart[i]

html+=`<p>${p.name} × ${p.qty}</p>`

total+=p.price*p.qty

}

document.getElementById("orderItems").innerHTML=html
document.getElementById("total").innerText=total

}

function goBack(){

document.getElementById("shopPage").style.display="block"
document.getElementById("orderPage").style.display="none"

}

function sendOrder(){

alert("تم إرسال الطلب")

}

function searchProduct(){

let text=document.getElementById("search").value

let filtered=products.filter(p=>p.name.includes(text))

let html=""

filtered.forEach((p)=>{

html+=`

<div class="product">

<img src="${p.img}">

<h4>${p.name}</h4>

<p>${p.price} جنيه</p>

</div>

`

})

document.getElementById("products").innerHTML=html

}

</script>

</body>
</html>
