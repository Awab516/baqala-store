<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>متجر البقالة</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
direction:rtl;
}

.header{
background:#27ae60;
color:white;
padding:12px;
text-align:center;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;
padding:10px;
}

.product{
background:white;
padding:10px;
border-radius:10px;
text-align:center;
}

.product img{
width:100%;
height:100px;
object-fit:cover;
border-radius:6px;
}

.qty{
display:flex;
justify-content:center;
gap:10px;
margin-top:6px;
}

.qty button{
background:#3498db;
color:white;
border:none;
padding:5px 10px;
border-radius:6px;
}

.nextBtn{
position:fixed;
bottom:15px;
left:15px;
right:15px;
background:#27ae60;
color:white;
padding:14px;
border:none;
border-radius:10px;
font-size:18px;
}

.page{
display:none;
}

</style>
</head>

<body>


<div id="shopPage">

<div class="header">متجر البقالة</div>

<div class="products" id="products"></div>

<button class="nextBtn" onclick="goLocation()">التالي</button>

</div>



<div id="locationPage" class="page">

<div class="header">إرسال موقعك</div>

<div style="padding:20px">

<button onclick="getLocation()" style="width:100%;padding:12px;background:#27ae60;color:white;border:none;border-radius:8px">
إرسال موقعي
</button>

<div id="locationStatus" style="margin-top:10px"></div>

<button onclick="goDelivery()" style="margin-top:20px;width:100%;padding:12px;background:#3498db;color:white;border:none;border-radius:8px">
التالي
</button>

</div>

</div>



<div id="deliveryPage" class="page">

<div class="header">اختيار الحي</div>

<div style="padding:20px">

<select id="deliverySelect" style="width:100%;padding:12px">

<option value="">اختر الحي</option>

<option value="500">الحي الأول - 500</option>

<option value="800">الحي الثاني - 800</option>

<option value="1200">الحي الثالث - 1200</option>

</select>

<button onclick="goOrder()" style="margin-top:20px;width:100%;padding:12px;background:#27ae60;color:white;border:none;border-radius:8px">
التالي
</button>

</div>

</div>



<div id="orderPage" class="page">

<div class="header">تفاصيل الطلب</div>

<div style="padding:20px">

<div id="orderItems"></div>

<p>سعر التوصيل: <span id="deliveryPrice"></span></p>

<h3>الإجمالي: <span id="total"></span> جنيه</h3>

<button onclick="sendOrder()" style="width:100%;padding:12px;background:#27ae60;color:white;border:none;border-radius:8px">
تأكيد الطلب
</button>

</div>

</div>



<script>

let locationData=null
let deliveryPrice=0

let products=[
{name:"سكر",price:1000,img:"https://images.unsplash.com/photo-1586201375761-83865001e31c"},
{name:"أرز",price:67,img:"https://images.unsplash.com/photo-1586201375799-3f2c9e70a5e3"},
{name:"زيت",price:850,img:"https://images.unsplash.com/photo-1604908176997-125f25cc6f3d"},
{name:"مكرونة",price:300,img:"https://images.unsplash.com/photo-1617196037304-0d7d6871f5ed"}
]

let cart={}

function showProducts(){

let html=""

products.forEach((p,i)=>{

html+=`

<div class="product">

<img src="${p.img}">

<h4>${p.name}</h4>

<p>${p.price} جنيه</p>

<div class="qty">

<button onclick="minus(${i})">-</button>

<span id="qty${i}">0</span>

<button onclick="plus(${i})">+</button>

</div>

</div>

`

})

document.getElementById("products").innerHTML=html

}

showProducts()


function plus(i){

if(!cart[i]) cart[i]={...products[i],qty:0}

cart[i].qty++

updateCart()

}

function minus(i){

if(cart[i]){

cart[i].qty--

if(cart[i].qty<=0) delete cart[i]

}

updateCart()

}

function updateCart(){

products.forEach((p,i)=>{

let q=cart[i]?cart[i].qty:0

let el=document.getElementById("qty"+i)

if(el) el.innerText=q

})

}


function goLocation(){

document.getElementById("shopPage").style.display="none"

document.getElementById("locationPage").style.display="block"

}


function getLocation(){

navigator.geolocation.getCurrentPosition(function(pos){

locationData={
lat:pos.coords.latitude,
lng:pos.coords.longitude
}

document.getElementById("locationStatus").innerText="تم تحديد الموقع"

})

}


function goDelivery(){

if(!locationData){

alert("يجب إرسال الموقع أولاً")

return

}

document.getElementById("locationPage").style.display="none"

document.getElementById("deliveryPage").style.display="block"

}


function goOrder(){

let select=document.getElementById("deliverySelect")

if(!select.value){

alert("اختر الحي")

return

}

deliveryPrice=parseInt(select.value)

document.getElementById("deliveryPage").style.display="none"

document.getElementById("orderPage").style.display="block"

let html=""
let total=0

for(let i in cart){

let p=cart[i]

html+=`<p>${p.name} × ${p.qty}</p>`

total+=p.price*p.qty

}

total+=deliveryPrice

document.getElementById("orderItems").innerHTML=html
document.getElementById("deliveryPrice").innerText=deliveryPrice
document.getElementById("total").innerText=total

}


function sendOrder(){

alert("تم إرسال الطلب")

}

</script>

</body>
</html>
