<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بقالة ستور</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
direction:rtl;
}

.header{
background:#2ecc71;
color:white;
text-align:center;
padding:18px;
font-size:24px;
}

.topbar{
display:flex;
gap:10px;
padding:10px;
}

.search{
flex:1;
}

.search input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

.cart-btn{
background:#e74c3c;
color:white;
border:none;
padding:10px 15px;
border-radius:8px;
font-size:16px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:12px;
padding:12px;
}

.product{
background:white;
padding:10px;
border-radius:12px;
text-align:center;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.product img{
width:100%;
height:110px;
object-fit:cover;
border-radius:8px;
}

.price{
margin:6px 0;
}

.qty{
display:flex;
justify-content:center;
gap:10px;
margin-top:6px;
}

.qty button{
background:#3498db;
border:none;
color:white;
padding:6px 12px;
border-radius:6px;
font-size:16px;
}

.warn{
color:red;
font-size:12px;
}

.cart{
position:fixed;
right:0;
top:0;
width:85%;
height:100%;
background:white;
padding:20px;
overflow:auto;
display:none;
}

</style>
</head>

<body>

<div class="header">
بقالة ستور
</div>

<div class="topbar">

<button class="cart-btn" onclick="openCart()">
🛒 <span id="cartCount">0</span>
</button>

<div class="search">
<input id="search" placeholder="ابحث عن منتج..." onkeyup="searchProduct()">
</div>

</div>

<div class="products" id="products"></div>

<div id="cart" class="cart">

<h2>السلة</h2>

<div id="cartItems"></div>

<h3>الإجمالي: <span id="total">0</span> جنيه</h3>

<h3>بيانات الطلب</h3>

<input placeholder="اسمك" id="name">
<input placeholder="رقمك" id="phone">
<input placeholder="موقعك" id="location">

<button onclick="sendOrder()">تأكيد الطلب</button>

</div>

<script>

let products=[
{name:"سكر",price:1000,stock:10,img:"https://images.unsplash.com/photo-1586201375761-83865001e31c"},
{name:"أرز",price:67,stock:3,img:"https://images.unsplash.com/photo-1586201375799-3f2c9e70a5e3"},
{name:"زيت",price:850,stock:7,img:"https://images.unsplash.com/photo-1604908176997-125f25cc6f3d"},
{name:"مكرونة",price:300,stock:2,img:"https://images.unsplash.com/photo-1617196037304-0d7d6871f5ed"},
{name:"شاي",price:400,stock:6,img:"https://images.unsplash.com/photo-1509042239860-f550ce710b93"}
]

let cart={}

let sound=new Audio("https://cdn.pixabay.com/download/audio/2022/03/15/audio_2b5f8e0c3a.mp3")

function showProducts(){

let html=""

products.forEach((p,i)=>{

let warn=""

if(p.stock<=3){
warn="<div class='warn'>⚠ الكمية قليلة</div>"
}

html+=`
<div class="product">

<img src="${p.img}">

<h4>${p.name}</h4>

<div class="price">${p.price} جنيه</div>

${warn}

<div class="qty">

<button onclick="minus(${i})">➖</button>

<span id="qty${i}">0</span>

<button onclick="plus(${i})">➕</button>

</div>

</div>
`

})

document.getElementById("products").innerHTML=html

}

showProducts()

function plus(i){

sound.play()

if(!cart[i]){
cart[i]={...products[i],qty:0}
}

cart[i].qty++

updateCart()

}

function minus(i){

if(cart[i]){

cart[i].qty--

if(cart[i].qty<=0){
delete cart[i]
}

}

updateCart()

}

function updateCart(){

let count=0
let total=0
let html=""

products.forEach((p,i)=>{

let q=cart[i]?cart[i].qty:0

let el=document.getElementById("qty"+i)
if(el) el.innerText=q

})

for(let i in cart){

let p=cart[i]

count+=p.qty

total+=p.price*p.qty

html+=`<p>${p.name} × ${p.qty}</p>`

}

document.getElementById("cartCount").innerText=count
document.getElementById("cartItems").innerHTML=html
document.getElementById("total").innerText=total

}

function openCart(){
document.getElementById("cart").style.display="block"
}

function sendOrder(){

let name=document.getElementById("name").value
let phone=document.getElementById("phone").value

if(!name || !phone){
alert("اكتب الاسم والرقم")
return
}

alert("تم إرسال الطلب")

}

function searchProduct(){

let text=document.getElementById("search").value

let filtered=products.filter(p=>p.name.includes(text))

let html=""

filtered.forEach((p)=>{

html+=`
<div class="product">

<img src="${p.img}">

<h4>${p.name}</h4>

<div class="price">${p.price} جنيه</div>

</div>
`

})

document.getElementById("products").innerHTML=html

}

</script>

</body>
</html>
