<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بقالة ستور</title>

<meta name="theme-color" content="#2ecc71">

<style>
body{font-family:Arial;direction:rtl;background:#f5f5f5;margin:0}
h1{background:#2ecc71;color:white;padding:15px;text-align:center;margin:0}
.card{background:white;padding:12px;margin:10px;border-radius:12px;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
button{background:#2ecc71;color:white;border:none;padding:8px 12px;border-radius:8px;margin-top:6px}
#cartIcon{position:fixed;bottom:20px;left:20px;background:#e74c3c;padding:14px;border-radius:50%;color:white;font-size:18px}
#cartBox{display:none;position:fixed;bottom:80px;left:10px;background:white;width:90%;max-height:60%;overflow:auto;padding:15px;border-radius:12px;box-shadow:0 4px 10px rgba(0,0,0,0.2)}
</style>

<!-- Firebase خفيف -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyANFomLC3CBPdB_3FS5ylbw1XHqHqFai3c",
  authDomain: "awab-store-f4428.firebaseapp.com",
  projectId: "awab-store-f4428"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let cart = [];

/* تحميل المنتجات */
async function loadProducts(){
  const container = document.getElementById("products");
  container.innerHTML = "جاري التحميل...";
  const snapshot = await db.collection("products").get();
  container.innerHTML = "";

  snapshot.forEach(doc=>{
    const data = doc.data();
    container.innerHTML += `
      <div class="card">
        <h3>${data.name}</h3>
        <p>${data.price} جنيه</p>
        <button onclick="addToCart('${data.name}', ${data.price})">أضف للسلة</button>
      </div>
    `;
  });
}

/* إضافة للسلة */
function addToCart(name, price){
  cart.push({name, price});
  updateCart();
}

/* تحديث السلة */
function updateCart(){
  const cartDiv = document.getElementById("cartItems");
  cartDiv.innerHTML = "";
  let total = 0;

  cart.forEach((item,index)=>{
    total += item.price;
    cartDiv.innerHTML += `
      <div>
        ${item.name} - ${item.price} جنيه
        <button onclick="removeItem(${index})">❌</button>
      </div>
    `;
  });

  document.getElementById("total").innerText = total;
  document.getElementById("cartCount").innerText = cart.length;
}

/* حذف عنصر */
function removeItem(index){
  cart.splice(index,1);
  updateCart();
}

/* فتح السلة */
function toggleCart(){
  const box = document.getElementById("cartBox");
  box.style.display = box.style.display === "none" ? "block" : "none";
}

/* تأكيد الطلب */
async function checkout(){
  if(cart.length === 0){
    alert("السلة فارغة");
    return;
  }

  await db.collection("orders").add({
    items: cart,
    date: new Date()
  });

  alert("تم إرسال الطلب ✅");
  cart = [];
  updateCart();
}

loadProducts();
</script>
</head>

<body>

<h1>بقالة ستور</h1>

<div id="products"></div>

<div id="cartIcon" onclick="toggleCart()">
🛒 <span id="cartCount">0</span>
</div>

<div id="cartBox">
<h3>السلة</h3>
<div id="cartItems"></div>
<p>الإجمالي: <span id="total">0</span> جنيه</p>
<button onclick="checkout()">تأكيد الطلب</button>
</div>

</body>
</html>
