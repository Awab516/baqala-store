<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بقالة ستور</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
direction:rtl;
}

.header{
background:#2ecc71;
color:white;
text-align:center;
padding:20px;
font-size:28px;
}

.product{
background:white;
margin:15px;
padding:20px;
border-radius:10px;
}

button{
background:#2ecc71;
border:none;
color:white;
padding:10px 20px;
border-radius:8px;
font-size:16px;
}

.cart-btn{
position:fixed;
bottom:20px;
left:20px;
background:#e74c3c;
width:65px;
height:65px;
border-radius:50%;
color:white;
font-size:22px;
display:flex;
align-items:center;
justify-content:center;
}

.cart{
position:fixed;
right:0;
top:0;
width:85%;
height:100%;
background:white;
padding:20px;
overflow:auto;
}

.qty{
display:flex;
gap:10px;
align-items:center;
}

.qty button{
padding:5px 12px;
font-size:18px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
}

</style>
</head>

<body>

<div class="header">
بقالة ستور
</div>

<div id="products"></div>

<div class="cart-btn" onclick="openCart()">
🛒 <span id="cartCount">0</span>
</div>

<div id="cart" class="cart" style="display:none">

<h2>السلة</h2>

<div id="cartItems"></div>

<h3>الإجمالي: <span id="total">0</span> جنيه</h3>

<h3>بيانات الطلب</h3>

<input placeholder="اسمك" id="name">
<input placeholder="رقمك" id="phone">
<input placeholder="موقعك" id="location">

<button onclick="sendOrder()">تأكيد الطلب</button>

</div>

<script>

let products=[
{name:"سكر",price:1000},
{name:"أرز",price:67},
{name:"زيت",price:850},
{name:"مكرونة",price:300}
]

let cart={}

function showProducts(){

let html=""

products.forEach((p,i)=>{

html+=`
<div class="product">

<h2>${p.name}</h2>

<p>${p.price} جنيه</p>

<button onclick="addCart(${i})">
أضف للسلة
</button>

</div>
`

})

document.getElementById("products").innerHTML=html

}

showProducts()

function addCart(i){

if(!cart[i]){
cart[i]={...products[i],qty:1}
}else{
cart[i].qty++
}

updateCart()

}

function plus(i){

cart[i].qty++
updateCart()

}

function minus(i){

cart[i].qty--

if(cart[i].qty<=0){
delete cart[i]
}

updateCart()

}

function updateCart(){

let count=0
let total=0
let html=""

for(let i in cart){

let p=cart[i]

count+=p.qty

total+=p.price*p.qty

html+=`
<div>

<b>${p.name}</b>

<div class="qty">

<button onclick="minus(${i})">➖</button>

${p.qty}

<button onclick="plus(${i})">➕</button>

</div>

<p>${p.price*p.qty} جنيه</p>

</div>
<hr>
`

}

document.getElementById("cartCount").innerText=count
document.getElementById("cartItems").innerHTML=html
document.getElementById("total").innerText=total

}

function openCart(){

document.getElementById("cart").style.display="block"

}

function sendOrder(){

let name=document.getElementById("name").value
let phone=document.getElementById("phone").value
let location=document.getElementById("location").value

if(!name || !phone){
alert("اكتب الاسم والرقم")
return
}

alert("تم إرسال الطلب")

}

</script>

</body>
</html>
