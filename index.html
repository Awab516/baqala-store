<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بقالة ستور</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
direction:rtl;
}

.header{
background:#27ae60;
color:white;
padding:15px;
text-align:center;
font-size:20px;
}

.top{
display:flex;
gap:10px;
padding:10px;
align-items:center;
}

.cart{
background:#e74c3c;
color:white;
padding:10px;
border-radius:10px;
}

.search input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.product{
background:white;
padding:10px;
border-radius:10px;
text-align:center;
}

.product img{
width:100%;
height:120px;
object-fit:cover;
border-radius:6px;
}

.qty{
display:flex;
justify-content:center;
gap:10px;
margin-top:6px;
}

.qty button{
background:#3498db;
color:white;
border:none;
padding:5px 10px;
border-radius:6px;
}

.next{
position:fixed;
bottom:10px;
left:10px;
right:10px;
background:#27ae60;
color:white;
padding:15px;
border:none;
border-radius:10px;
font-size:18px;
}

.page{
display:none;
padding:20px;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
cursor:pointer;
}

</style>
</head>

<body>

<div id="login">

<div class="header">مرحبا بك</div>

<div style="padding:20px">

<input id="name" placeholder="اسمك">

<input id="phone" placeholder="رقمك">

<button onclick="saveUser()" style="margin-top:10px;background:#27ae60;color:white;padding:12px;border:none;border-radius:8px;width:100%">
دخول
</button>

</div>

</div>

<div id="shop" style="display:none">

<div class="header">بقالة ستور</div>

<div class="top">

<div class="cart">
🛒 <span id="count">0</span>
</div>

<div class="search">
<input placeholder="ابحث عن منتج" onkeyup="searchProduct(this.value)">
</div>

</div>

<div class="products" id="products"></div>

<button class="next" onclick="goLocation()">التالي</button>

</div>

<div id="locationPage" class="page">

<h3>إرسال الموقع</h3>

<button onclick="openMaps()" style="background:#27ae60;color:white;border:none;padding:12px;border-radius:8px;width:100%">
فتح الخريطة
</button>

<input id="locationLink" placeholder="الصق رابط الموقع هنا">

<select id="district">
<option value="">اختر الحي</option>
<option value="300">الحي الشرقي - 300</option>
<option value="400">الحي الغربي - 400</option>
<option value="500">الحي الأوسط - 500</option>
</select>

<button onclick="goOrder()" style="margin-top:15px;background:#3498db;color:white;border:none;padding:12px;border-radius:8px;width:100%">
التالي
</button>

</div>

<div id="orderPage" class="page">

<h3>تفاصيل الطلب</h3>

<div id="items"></div>

<p>التوصيل: <span id="delivery"></span></p>

<h3>الإجمالي: <span id="total"></span></h3>

<button onclick="goPayment()" style="background:#27ae60;color:white;border:none;padding:12px;border-radius:8px;width:100%">
التالي
</button>

</div>

<div id="paymentPage" class="page">

<h3>طريقة الدفع</h3>

<select id="payment">
<option value="">اختر</option>
<option value="cash">كاش</option>
<option value="online">اونلاين</option>
</select>

<select id="wallet" style="display:none">
<option value="">اختر المحفظة</option>
<option>بنكك</option>
<option>ماي كاشي</option>
<option>أوكاشي</option>
</select>

<button onclick="confirmOrder()" style="margin-top:10px;background:#27ae60;color:white;border:none;padding:12px;border-radius:8px;width:100%">
تأكيد الطلب
</button>

</div>

<script>

let user=localStorage.getItem("user")

if(user){
document.getElementById("login").style.display="none"
document.getElementById("shop").style.display="block"
}

function saveUser(){

let name=document.getElementById("name").value
let phone=document.getElementById("phone").value

if(!name||!phone){
alert("اكتب البيانات")
return
}

localStorage.setItem("user",JSON.stringify({name,phone}))

location.reload()

}

let products=[
{name:"سكر",price:1000,img:"https://i.imgur.com/2DhmtJ4.jpg"},
{name:"أرز",price:67,img:"https://i.imgur.com/Q8bKQpP.jpg"},
{name:"زيت",price:850,img:"https://i.imgur.com/AvYJ6vR.jpg"},
{name:"مكرونة",price:300,img:"https://i.imgur.com/ob0y6MR.jpg"},
{name:"عدس",price:500,img:"https://i.imgur.com/f9J3K4F.jpg"},
{name:"ملح",price:50,img:"https://i.imgur.com/Anu7P8P.jpg"}
]

let cart={}

function showProducts(list=products){

let html=""

list.forEach((p,i)=>{

html+=`

<div class="product">

<img src="${p.img}">

<h4>${p.name}</h4>

<p>${p.price} جنيه</p>

<div class="qty">

<button onclick="minus(${i})">-</button>
<span id="q${i}">0</span>
<button onclick="plus(${i})">+</button>

</div>

</div>

`

})

products.forEach((p,i)=>{
if(!cart[i]) cart[i]={...p,qty:0}
})

document.getElementById("products").innerHTML=html

}

showProducts()

function plus(i){

if(navigator.vibrate) navigator.vibrate(50)

cart[i].qty++

document.getElementById("q"+i).innerText=cart[i].qty

updateCount()

}

function minus(i){

if(cart[i].qty>0){
cart[i].qty--
}

document.getElementById("q"+i).innerText=cart[i].qty

updateCount()

}

function updateCount(){

let c=0

for(let i in cart){
c+=cart[i].qty
}

document.getElementById("count").innerText=c

}

function searchProduct(text){

let f=products.filter(p=>p.name.includes(text))

showProducts(f)

}

function goLocation(){

document.getElementById("shop").style.display="none"
document.getElementById("locationPage").style.display="block"

}

function openMaps(){

window.open("https://www.google.com/maps","_blank")

alert("حدد موقعك في الخريطة ثم انسخ الرابط والصقه هنا")

}

let delivery=0

function goOrder(){

let link=document.getElementById("locationLink").value

if(link==""){
alert("أدخل الموقع")
return
}

let d=document.getElementById("district").value

if(d==""){
alert("اختر الحي")
return
}

delivery=parseInt(d)

document.getElementById("locationPage").style.display="none"
document.getElementById("orderPage").style.display="block"

let html=""
let total=0

for(let i in cart){

if(cart[i].qty>0){

html+=cart[i].name+" × "+cart[i].qty+"<br>"

total+=cart[i].price*cart[i].qty

}

}

total+=delivery

document.getElementById("items").innerHTML=html
document.getElementById("delivery").innerText=delivery
document.getElementById("total").innerText=total+" جنيه"

}

function goPayment(){

document.getElementById("orderPage").style.display="none"
document.getElementById("paymentPage").style.display="block"

}

document.getElementById("payment").onchange=function(){

if(this.value=="online"){
document.getElementById("wallet").style.display="block"
}else{
document.getElementById("wallet").style.display="none"
}

}

function confirmOrder(){

let pay=document.getElementById("payment").value

if(pay==""){
alert("اختر الدفع")
return
}

let wallet=document.getElementById("wallet").value

let user=JSON.parse(localStorage.getItem("user"))

let order={
name:user.name,
phone:user.phone,
cart:cart,
delivery:delivery,
location:document.getElementById("locationLink").value,
payment:pay,
wallet:wallet,
time:new Date().toLocaleString()
}

let orders=JSON.parse(localStorage.getItem("orders")||"[]")

orders.push(order)

localStorage.setItem("orders",JSON.stringify(orders))

alert("تم إرسال الطلب")

location.reload()

}

</script>

</body>
</html>
