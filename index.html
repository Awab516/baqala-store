<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بقالة ستور</title>

<style>
body{font-family:Arial;direction:rtl;background:#f2f2f2;margin:0}
h1{background:#2ecc71;color:white;padding:15px;text-align:center;margin:0}
.container{padding:10px}
.card{background:white;padding:15px;margin-bottom:10px;border-radius:12px}
button{background:#2ecc71;color:white;border:none;padding:8px 12px;border-radius:8px;margin-top:6px}
#cartIcon{position:fixed;bottom:20px;left:20px;background:#e74c3c;padding:15px;border-radius:50%;color:white}
#cartBox{display:none;position:fixed;bottom:80px;left:10px;background:white;width:90%;max-height:60%;overflow:auto;padding:15px;border-radius:12px}
</style>

</head>
<body>

<h1>بقالة ستور</h1>

<div class="container" id="products"></div>

<div id="cartIcon" onclick="toggleCart()">🛒 <span id="count">0</span></div>

<div id="cartBox">
<h3>السلة</h3>
<div id="cartItems"></div>
<p>الإجمالي: <span id="total">0</span> جنيه</p>
<button onclick="sendOrder()">تأكيد الطلب</button>
</div>

<script>
const products = [
  {name:"أرز", price:67},
  {name:"سكر", price:1000},
  {name:"زيت", price:850},
  {name:"مكرونة", price:300}
];

let cart = [];

function render(){
  const container = document.getElementById("products");
  products.forEach((p,i)=>{
    container.innerHTML += `
      <div class="card">
        <h3>${p.name}</h3>
        <p>${p.price} جنيه</p>
        <button onclick="add(${i})">أضف للسلة</button>
      </div>
    `;
  });
}

function add(i){
  cart.push(products[i]);
  updateCart();
}

function updateCart(){
  const box = document.getElementById("cartItems");
  box.innerHTML="";
  let total=0;
  cart.forEach(item=>{
    total+=item.price;
    box.innerHTML += `<p>${item.name} - ${item.price}</p>`;
  });
  document.getElementById("total").innerText=total;
  document.getElementById("count").innerText=cart.length;
}

function toggleCart(){
  const box=document.getElementById("cartBox");
  box.style.display = box.style.display==="none"?"block":"none";
}

function sendOrder(){
  alert("الطلب اتسجل (الإدارة نربطها بعدين)");
  cart=[];
  updateCart();
}

render();
</script>

</body>
</html>
