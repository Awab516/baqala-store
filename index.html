<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بقالة ستور</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
direction:rtl;
}

.header{
background:#2ecc71;
color:white;
text-align:center;
padding:18px;
font-size:24px;
}

.register{
padding:20px;
}

.register input{
width:100%;
padding:12px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ccc;
}

.register button{
background:#2ecc71;
color:white;
border:none;
padding:12px;
width:100%;
border-radius:8px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:12px;
padding:12px;
}

.product{
background:white;
padding:10px;
border-radius:12px;
text-align:center;
}

.product img{
width:100%;
height:110px;
object-fit:cover;
border-radius:8px;
}

.qty{
display:flex;
justify-content:center;
gap:10px;
margin-top:6px;
}

.qty button{
background:#3498db;
color:white;
border:none;
padding:6px 12px;
border-radius:6px;
}

.nextBtn{
position:fixed;
bottom:20px;
left:20px;
right:20px;
background:#2ecc71;
color:white;
border:none;
padding:14px;
border-radius:10px;
font-size:18px;
}

</style>
</head>

<body>

<div id="registerPage" class="register">

<h3>أدخل بياناتك</h3>

<input id="userName" placeholder="اسمك">

<input id="userPhone" placeholder="رقمك">

<input id="userEmail" placeholder="ايميلك (اختياري)">

<button onclick="saveUser()">دخول المتجر</button>

</div>


<div id="shopPage" style="display:none">

<div class="header">
بقالة ستور
</div>

<div class="products" id="products"></div>

<button class="nextBtn" onclick="goOrder()">
التالي
</button>

</div>


<script>

let savedUser=localStorage.getItem("user")

if(savedUser){

document.getElementById("registerPage").style.display="none"
document.getElementById("shopPage").style.display="block"

}

function saveUser(){

let name=document.getElementById("userName").value
let phone=document.getElementById("userPhone").value
let email=document.getElementById("userEmail").value

if(!name || !phone){
alert("اكتب الاسم والرقم")
return
}

let user={
name:name,
phone:phone,
email:email
}

localStorage.setItem("user",JSON.stringify(user))

location.reload()

}


let products=[
{name:"سكر",price:1000,img:"https://images.unsplash.com/photo-1586201375761-83865001e31c"},
{name:"أرز",price:67,img:"https://images.unsplash.com/photo-1586201375799-3f2c9e70a5e3"},
{name:"زيت",price:850,img:"https://images.unsplash.com/photo-1604908176997-125f25cc6f3d"},
{name:"مكرونة",price:300,img:"https://images.unsplash.com/photo-1617196037304-0d7d6871f5ed"}
]

let cart={}

function showProducts(){

let html=""

products.forEach((p,i)=>{

html+=`

<div class="product">

<img src="${p.img}">

<h4>${p.name}</h4>

<p>${p.price} جنيه</p>

<div class="qty">

<button onclick="minus(${i})">-</button>

<span id="qty${i}">0</span>

<button onclick="plus(${i})">+</button>

</div>

</div>

`

})

document.getElementById("products").innerHTML=html

}

showProducts()

function plus(i){

if(!cart[i]){
cart[i]={...products[i],qty:0}
}

cart[i].qty++

updateQty()

}

function minus(i){

if(cart[i]){

cart[i].qty--

if(cart[i].qty<=0){
delete cart[i]
}

}

updateQty()

}

function updateQty(){

products.forEach((p,i)=>{

let q=cart[i]?cart[i].qty:0

let el=document.getElementById("qty"+i)

if(el) el.innerText=q

})

}

function goOrder(){

let user=JSON.parse(localStorage.getItem("user"))

alert("الطلب باسم: "+user.name)

}

</script>

</body>
</html>
