<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyANFomLC3CBPdB_3FS5ylbw1XHqHqFai3c",
authDomain: "awab-store-f4428.firebaseapp.com",
projectId: "awab-store-f4428",
storageBucket: "awab-store-f4428.firebasestorage.app",
messagingSenderId: "385135199201",
appId: "1:385135199201:web:10c3ec0ae39f5fb0a3c8a0"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.sendOrder = async function(){

let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;
let location = localStorage.getItem("location");
let payment = document.getElementById("payment").value;

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let total = 0;

cart.forEach(p=>{
total += p.price * p.qty;
});

await addDoc(collection(db,"orders"),{

customerName:name,
phone:phone,
location:location,
payment:payment,
cart:cart,
total:total,
status:"طلب جديد",
time:Date.now()

});

alert("تم إرسال الطلب بنجاح");

localStorage.removeItem("cart");

location.reload();

}

</script>
