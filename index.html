<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بقالة ستور</title>

<style>
body{font-family:Arial;direction:rtl;background:#f5f5f5;margin:0}
h1{background:#2ecc71;color:white;padding:15px;text-align:center;margin:0}
.card{background:white;padding:12px;margin:10px;border-radius:12px}
button{background:#2ecc71;color:white;border:none;padding:8px;border-radius:8px;margin-top:6px}
#cartIcon{position:fixed;bottom:20px;left:20px;background:#e74c3c;padding:14px;border-radius:50%;color:white}
#cartBox{display:none;position:fixed;bottom:80px;left:10px;background:white;width:90%;max-height:60%;overflow:auto;padding:15px;border-radius:12px}
</style>

<script>
let cart = [];
let db = null;

/* تحميل سريع من التخزين المحلي */
function loadCachedProducts(){
  const cached = localStorage.getItem("products");
  if(cached){
    renderProducts(JSON.parse(cached));
  }
}

/* عرض المنتجات */
function renderProducts(products){
  const container = document.getElementById("products");
  container.innerHTML = "";
  products.forEach(p=>{
    container.innerHTML += `
      <div class="card">
        <h3>${p.name}</h3>
        <p>${p.price} جنيه</p>
        <button onclick="addToCart('${p.name}', ${p.price})">أضف للسلة</button>
      </div>
    `;
  });
}

/* تحميل من Firebase في الخلفية */
function loadFromFirebase(){
  const script1 = document.createElement("script");
  script1.src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js";
  document.head.appendChild(script1);

  const script2 = document.createElement("script");
  script2.src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js";
  document.head.appendChild(script2);

  script2.onload = function(){
    const firebaseConfig = {
      apiKey: "AIzaSyANFomLC3CBPdB_3FS5ylbw1XHqHqFai3c",
      authDomain: "awab-store-f4428.firebaseapp.com",
      projectId: "awab-store-f4428"
    };

    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();

    db.collection("products").get().then(snapshot=>{
      let products=[];
      snapshot.forEach(doc=>products.push(doc.data()));
      localStorage.setItem("products", JSON.stringify(products));
      renderProducts(products);
    });
  }
}

/* سلة */
function addToCart(name, price){
  cart.push({name, price});
  updateCart();
}

function updateCart(){
  let total=0;
  cart.forEach(i=> total+=i.price);
  document.getElementById("total").innerText=total;
  document.getElementById("cartCount").innerText=cart.length;
}

function toggleCart(){
  const box=document.getElementById("cartBox");
  box.style.display = box.style.display==="none"?"block":"none";
}

/* إرسال الطلب */
function checkout(){
  if(!db){
    alert("جاري التحميل...");
    return;
  }

  if(cart.length===0){
    alert("السلة فارغة");
    return;
  }

  db.collection("orders").add({
    items:cart,
    date:new Date()
  });

  alert("تم إرسال الطلب");
  cart=[];
  updateCart();
}

/* تشغيل */
loadCachedProducts();
loadFromFirebase();
</script>

</head>

<body>

<h1>بقالة ستور</h1>

<div id="products">جاري التحميل...</div>

<div id="cartIcon" onclick="toggleCart()">
🛒 <span id="cartCount">0</span>
</div>

<div id="cartBox">
<h3>السلة</h3>
<p>الإجمالي: <span id="total">0</span> جنيه</p>
<button onclick="checkout()">تأكيد الطلب</button>
</div>

</body>
</html>
