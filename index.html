<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بقالة ستور</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2ecc71">

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyANFomLC3CBPdB_3FS5ylbw1XHqHqFai3c",
  authDomain: "awab-store-f4428.firebaseapp.com",
  projectId: "awab-store-f4428"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let cart = [];

async function loadProducts() {
  const productsDiv = document.getElementById("products");
  const querySnapshot = await getDocs(collection(db, "products"));
  productsDiv.innerHTML = "";

  querySnapshot.forEach((doc) => {
    const data = doc.data();
    productsDiv.innerHTML += `
      <div class="card">
        <img src="${data.image || ''}" width="100%">
        <h3>${data.name}</h3>
        <p>${data.price} جنيه</p>
        <button onclick="addToCart('${data.name}', ${data.price})">أضف للسلة</button>
      </div>
    `;
  });
}

window.addToCart = function(name, price){
  cart.push({name, price});
  updateCart();
}

function updateCart(){
  const cartDiv = document.getElementById("cartItems");
  cartDiv.innerHTML = "";
  let total = 0;

  cart.forEach((item,index)=>{
    total += item.price;
    cartDiv.innerHTML += `
      <div>
        ${item.name} - ${item.price} جنيه
        <button onclick="removeItem(${index})">❌</button>
      </div>
    `;
  });

  document.getElementById("total").innerText = total;
  document.getElementById("cartCount").innerText = cart.length;
}

window.removeItem = function(index){
  cart.splice(index,1);
  updateCart();
}

window.toggleCart = function(){
  const box = document.getElementById("cartBox");
  box.style.display = box.style.display === "none" ? "block" : "none";
}

window.checkout = async function(){
  if(cart.length === 0){
    alert("السلة فارغة");
    return;
  }

  await addDoc(collection(db,"orders"),{
    items: cart,
    date: new Date()
  });

  alert("تم إرسال الطلب");
  cart = [];
  updateCart();
}

loadProducts();
</script>

<style>
body{font-family:Arial;direction:rtl;background:#f5f5f5;margin:0}
h1{background:#2ecc71;color:white;padding:15px;text-align:center}
.card{background:white;padding:10px;margin:10px;border-radius:10px}
button{background:#2ecc71;color:white;border:none;padding:8px;border-radius:8px;margin:5px}
#cartIcon{position:fixed;bottom:20px;left:20px;background:#e74c3c;padding:15px;border-radius:50%;color:white}
#cartBox{display:none;position:fixed;bottom:80px;left:10px;background:white;width:90%;max-height:60%;overflow:auto;padding:15px;border-radius:10px}
</style>
</head>

<body>

<h1>بقالة ستور</h1>

<div id="products"></div>

<div id="cartIcon" onclick="toggleCart()">
🛒 <span id="cartCount">0</span>
</div>

<div id="cartBox">
<h3>السلة</h3>
<div id="cartItems"></div>
<p>الإجمالي: <span id="total">0</span> جنيه</p>
<button onclick="checkout()">تأكيد الطلب</button>
</div>

</body>
</html>
