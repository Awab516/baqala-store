<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بقالة ستور</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
direction:rtl;
}

.header{
background:#2ecc71;
color:white;
text-align:center;
padding:20px;
font-size:28px;
}

.search{
padding:15px;
}

.search input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

.product{
background:white;
margin:15px;
padding:20px;
border-radius:10px;
}

button{
background:#2ecc71;
border:none;
color:white;
padding:8px 14px;
border-radius:8px;
font-size:16px;
}

.qty{
display:flex;
gap:10px;
align-items:center;
margin-top:10px;
}

.qty button{
background:#3498db;
}

.cart-btn{
position:fixed;
bottom:20px;
left:20px;
background:#e74c3c;
width:65px;
height:65px;
border-radius:50%;
color:white;
font-size:22px;
display:flex;
align-items:center;
justify-content:center;
}

.cart{
position:fixed;
right:0;
top:0;
width:85%;
height:100%;
background:white;
padding:20px;
overflow:auto;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
}

.warn{
color:red;
font-size:14px;
margin-top:5px;
}

</style>
</head>

<body>

<div class="header">
بقالة ستور
</div>

<div class="search">
<input id="search" placeholder="ابحث عن منتج..." onkeyup="searchProduct()">
</div>

<div id="products"></div>

<div class="cart-btn" onclick="openCart()">
🛒 <span id="cartCount">0</span>
</div>

<div id="cart" class="cart" style="display:none">

<h2>السلة</h2>

<div id="cartItems"></div>

<h3>الإجمالي: <span id="total">0</span> جنيه</h3>

<h3>بيانات الطلب</h3>

<input placeholder="اسمك" id="name">
<input placeholder="رقمك" id="phone">
<input placeholder="موقعك" id="location">

<button onclick="sendOrder()">تأكيد الطلب</button>

</div>

<script>

let products=[
{name:"سكر",price:1000,stock:10},
{name:"أرز",price:67,stock:3},
{name:"زيت",price:850,stock:7},
{name:"مكرونة",price:300,stock:2}
]

let cart={}

function showProducts(list=products){

let html=""

list.forEach((p,i)=>{

let warn=""

if(p.stock<=3){
warn="<div class='warn'>⚠ الكمية قليلة</div>"
}

html+=`
<div class="product">

<h2>${p.name}</h2>

<p>${p.price} جنيه</p>

${warn}

<div class="qty">

<button onclick="minus(${i})">➖</button>

<span id="qty${i}">0</span>

<button onclick="plus(${i})">➕</button>

</div>

</div>
`

})

document.getElementById("products").innerHTML=html

}

showProducts()

function searchProduct(){

let text=document.getElementById("search").value

let filtered=products.filter(p=>p.name.includes(text))

showProducts(filtered)

}

function plus(i){

if(!cart[i]){
cart[i]={...products[i],qty:0}
}

if(cart[i].qty < products[i].stock){
cart[i].qty++
}

updateCart()

}

function minus(i){

if(cart[i]){

cart[i].qty--

if(cart[i].qty<=0){
delete cart[i]
}

}

updateCart()

}

function updateCart(){

let count=0
let total=0
let html=""

products.forEach((p,i)=>{

let q=cart[i]?cart[i].qty:0

let el=document.getElementById("qty"+i)
if(el) el.innerText=q

})

for(let i in cart){

let p=cart[i]

count+=p.qty

total+=p.price*p.qty

html+=`
<p>
${p.name} × ${p.qty}
</p>
`

}

document.getElementById("cartCount").innerText=count
document.getElementById("cartItems").innerHTML=html
document.getElementById("total").innerText=total

}

function openCart(){
document.getElementById("cart").style.display="block"
}

function sendOrder(){

let name=document.getElementById("name").value
let phone=document.getElementById("phone").value
let location=document.getElementById("location").value

if(!name || !phone){
alert("اكتب الاسم والرقم")
return
}

alert("تم إرسال الطلب")

}

</script>

</body>
</html>
