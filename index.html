<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>متجر البقالة</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
direction:rtl;
}

.header{
background:#27ae60;
color:white;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
}

.profile{
width:40px;
height:40px;
background:white;
color:#27ae60;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

.topbar{
display:flex;
gap:10px;
padding:10px;
align-items:center;
}

.cart{
background:#e74c3c;
color:white;
padding:10px;
border-radius:8px;
}

.search input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;
padding:10px;
}

.product{
background:white;
padding:10px;
border-radius:10px;
text-align:center;
}

.product img{
width:100%;
height:100px;
object-fit:cover;
border-radius:6px;
}

.qty{
display:flex;
justify-content:center;
gap:10px;
margin-top:6px;
}

.qty button{
background:#3498db;
color:white;
border:none;
padding:5px 10px;
border-radius:6px;
}

.nextBtn{
position:fixed;
bottom:15px;
left:15px;
right:15px;
background:#27ae60;
color:white;
padding:14px;
border:none;
border-radius:10px;
font-size:18px;
}

.page{
display:none;
}

</style>
</head>

<body>


<div id="shopPage">

<div class="header">

<div>متجر البقالة</div>

<div class="profile" id="profileCircle">A</div>

</div>

<div class="topbar">

<div class="cart">
🛒 <span id="cartCount">0</span>
</div>

<div class="search">
<input id="search" placeholder="ابحث..." onkeyup="searchProduct()">
</div>

</div>

<div class="products" id="products"></div>

<button class="nextBtn" onclick="goLocation()">التالي</button>

</div>



<div id="locationPage" class="page">

<div class="header">إرسال موقعك</div>

<div style="padding:20px">

<p>يرجى إرسال موقعك لإكمال الطلب</p>

<button onclick="getLocation()" style="width:100%;padding:12px;background:#27ae60;color:white;border:none;border-radius:8px">
إرسال موقعي
</button>

<div id="locationStatus" style="margin-top:10px"></div>

<button onclick="goOrder()" style="margin-top:20px;width:100%;padding:12px;background:#3498db;color:white;border:none;border-radius:8px">
التالي
</button>

</div>

</div>



<div id="orderPage" class="page">

<div class="header">تفاصيل الطلب</div>

<div style="padding:20px">

<div id="orderItems"></div>

<h3>الإجمالي: <span id="total"></span> جنيه</h3>

<button onclick="goBack()" style="width:100%;padding:12px;background:#777;color:white;border:none;border-radius:8px;margin-bottom:10px">
رجوع
</button>

<button onclick="sendOrder()" style="width:100%;padding:12px;background:#27ae60;color:white;border:none;border-radius:8px">
تأكيد الطلب
</button>

</div>

</div>


<script>

let user=JSON.parse(localStorage.getItem("user"))

if(user){
document.getElementById("profileCircle").innerText=user.name.charAt(0)
}

let locationData=null


let products=[
{name:"سكر",price:1000,img:"https://images.unsplash.com/photo-1586201375761-83865001e31c"},
{name:"أرز",price:67,img:"https://images.unsplash.com/photo-1586201375799-3f2c9e70a5e3"},
{name:"زيت",price:850,img:"https://images.unsplash.com/photo-1604908176997-125f25cc6f3d"},
{name:"مكرونة",price:300,img:"https://images.unsplash.com/photo-1617196037304-0d7d6871f5ed"}
]

let cart={}

function showProducts(list=products){

let html=""

list.forEach((p,i)=>{

html+=`

<div class="product">

<img src="${p.img}">

<h4>${p.name}</h4>

<p>${p.price} جنيه</p>

<div class="qty">

<button onclick="minus(${i})">-</button>

<span id="qty${i}">0</span>

<button onclick="plus(${i})">+</button>

</div>

</div>

`

})

document.getElementById("products").innerHTML=html

}

showProducts()


function plus(i){

if(!cart[i]) cart[i]={...products[i],qty:0}

cart[i].qty++

updateCart()

}

function minus(i){

if(cart[i]){

cart[i].qty--

if(cart[i].qty<=0) delete cart[i]

}

updateCart()

}

function updateCart(){

let count=0

products.forEach((p,i)=>{

let q=cart[i]?cart[i].qty:0

let el=document.getElementById("qty"+i)

if(el) el.innerText=q

})

for(let i in cart){

count+=cart[i].qty

}

document.getElementById("cartCount").innerText=count

}


function searchProduct(){

let text=document.getElementById("search").value

let filtered=products.filter(p=>p.name.includes(text))

showProducts(filtered)

}


function goLocation(){

document.getElementById("shopPage").style.display="none"

document.getElementById("locationPage").style.display="block"

}


function getLocation(){

navigator.geolocation.getCurrentPosition(function(pos){

locationData={
lat:pos.coords.latitude,
lng:pos.coords.longitude
}

document.getElementById("locationStatus").innerText="تم تحديد الموقع"

})

}


function goOrder(){

if(!locationData){

alert("يجب إرسال الموقع أولاً")

return

}

document.getElementById("locationPage").style.display="none"

document.getElementById("orderPage").style.display="block"

let html=""
let total=0

for(let i in cart){

let p=cart[i]

html+=`<p>${p.name} × ${p.qty}</p>`

total+=p.price*p.qty

}

document.getElementById("orderItems").innerHTML=html
document.getElementById("total").innerText=total

}


function goBack(){

document.getElementById("orderPage").style.display="none"

document.getElementById("shopPage").style.display="block"

}


function sendOrder(){

alert("تم إرسال الطلب مع الموقع")

}

</script>

</body>
</html>
