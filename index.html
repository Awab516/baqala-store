<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بقالة ستور</title>

<style>
body{font-family:Arial;direction:rtl;background:#f2f2f2;margin:0}
h1{background:#2ecc71;color:white;padding:15px;text-align:center;margin:0}
.container{padding:10px}
.card{background:white;padding:15px;margin-bottom:10px;border-radius:10px}
button{background:#2ecc71;color:white;border:none;padding:6px 10px;border-radius:6px;margin:3px}
.qty{display:flex;align-items:center;gap:10px}
#cartIcon{position:fixed;bottom:20px;left:20px;background:#e74c3c;padding:15px;border-radius:50%;color:white}
#cartBox{display:none;position:fixed;bottom:80px;left:10px;background:white;width:90%;max-height:65%;overflow:auto;padding:15px;border-radius:10px}
input{width:100%;padding:6px;margin-top:5px;margin-bottom:8px}
.warning{color:red;font-size:14px}
</style>
</head>

<body>

<h1>بقالة ستور</h1>

<div class="container" id="products"></div>

<div id="cartIcon" onclick="toggleCart()">🛒 <span id="count">0</span></div>

<div id="cartBox">
<h3>السلة</h3>
<div id="cartItems"></div>
<p>الإجمالي: <span id="total">0</span> جنيه</p>

<h4>بيانات الطلب</h4>
<input type="text" id="name" placeholder="اسمك">
<input type="text" id="phone" placeholder="رقمك">
<input type="text" id="location" placeholder="موقعك">

<p class="warning" id="warning"></p>

<button onclick="sendOrder()">تأكيد الطلب</button>
</div>

<script>
const products = [
  {name:"سكر", price:1000},
  {name:"أرز", price:67},
  {name:"زيت", price:850},
  {name:"مكرونة", price:300}
];

let cart = [];

function render(){
  const container = document.getElementById("products");
  container.innerHTML="";
  products.forEach((p,i)=>{
    container.innerHTML += `
      <div class="card">
        <h3>${p.name}</h3>
        <p>${p.price} جنيه</p>
        <button onclick="add(${i})">أضف للسلة</button>
      </div>
    `;
  });
}

function add(i){
  const existing = cart.find(item => item.name === products[i].name);
  if(existing){
    existing.qty++;
  }else{
    cart.push({...products[i], qty:1});
  }
  updateCart();
}

function updateCart(){
  const box = document.getElementById("cartItems");
  box.innerHTML="";
  let total=0;

  cart.forEach((item,index)=>{
    total+=item.price*item.qty;
    box.innerHTML += `
      <div>
        ${item.name} 
        <div class="qty">
          <button onclick="decrease(${index})">-</button>
          ${item.qty}
          <button onclick="increase(${index})">+</button>
          <button onclick="removeItem(${index})">❌</button>
        </div>
      </div>
    `;
  });

  document.getElementById("total").innerText=total;
  document.getElementById("count").innerText=cart.length;
}

function increase(i){
  cart[i].qty++;
  updateCart();
}

function decrease(i){
  if(cart[i].qty>1){
    cart[i].qty--;
  }
  updateCart();
}

function removeItem(i){
  cart.splice(i,1);
  updateCart();
}

function toggleCart(){
  const box=document.getElementById("cartBox");
  box.style.display = box.style.display==="none"?"block":"none";
}

function sendOrder(){
  const name=document.getElementById("name").value.trim();
  const phone=document.getElementById("phone").value.trim();
  const location=document.getElementById("location").value.trim();
  const warning=document.getElementById("warning");

  if(cart.length===0){
    warning.innerText="السلة فارغة";
    return;
  }

  if(!name || !phone || !location){
    warning.innerText="أدخل كل البيانات";
    return;
  }

  warning.innerText="";
  alert("تم تسجيل الطلب بنجاح");
  cart=[];
  updateCart();
  document.getElementById("name").value="";
  document.getElementById("phone").value="";
  document.getElementById("location").value="";
}

render();
</script>

</body>
</html>
