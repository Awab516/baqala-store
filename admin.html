<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إدارة الطلبات</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
direction:rtl;
}

.header{
background:#27ae60;
color:white;
padding:15px;
text-align:center;
font-size:20px;
}

.order{
background:white;
margin:10px;
padding:15px;
border-radius:10px;
}

button{
padding:10px;
border:none;
border-radius:6px;
margin-top:5px;
cursor:pointer;
}

.map{
background:#3498db;
color:white;
}

.delete{
background:#e74c3c;
color:white;
}

</style>
</head>

<body>

<div class="header">
لوحة إدارة الطلبات
</div>

<div id="orders"></div>

<script>

let orders=JSON.parse(localStorage.getItem("orders")||"[]")

function showOrders(){

let html=""

if(orders.length==0){
html="<p style='padding:20px'>لا يوجد طلبات</p>"
}

orders.forEach((o,i)=>{

let items=""

for(let k in o.cart){

if(o.cart[k].qty>0){

items+=o.cart[k].name+" × "+o.cart[k].qty+"<br>"

}

}

html+=`

<div class="order">

<b>الاسم:</b> ${o.name}<br>
<b>الرقم:</b> ${o.phone}<br>

<hr>

<b>الطلبات:</b><br>
${items}

<hr>

<b>التوصيل:</b> ${o.delivery} جنيه<br>
<b>الدفع:</b> ${o.payment}<br>
<b>الوقت:</b> ${o.time}

<br><br>

<button class="map" onclick="openMap('${o.location}')">
فتح الموقع
</button>

<button class="delete" onclick="deleteOrder(${i})">
حذف الطلب
</button>

</div>

`

})

document.getElementById("orders").innerHTML=html

}

function openMap(link){

window.open(link)

}

function deleteOrder(i){

orders.splice(i,1)

localStorage.setItem("orders",JSON.stringify(orders))

showOrders()

}

showOrders()

</script>

</body>
</html>
