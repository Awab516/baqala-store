<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة إدارة الطلبات</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
direction:rtl;
}

.header{
background:#27ae60;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.orders{
padding:10px;
}

.order{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:10px;
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
margin-top:5px;
}

.call{
background:#3498db;
color:white;
}

.map{
background:#27ae60;
color:white;
}

</style>

</head>

<body>

<div class="header">لوحة إدارة الطلبات</div>

<div class="orders" id="orders"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyANFomLC3CBPdB_3FS5ylbw1XHqHqFai3c",
authDomain: "awab-store-f4428.firebaseapp.com",
projectId: "awab-store-f4428",
storageBucket: "awab-store-f4428.firebasestorage.app",
messagingSenderId: "385135199201",
appId: "1:385135199201:web:10c3ec0ae39f5fb0a3c8a0"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let container=document.getElementById("orders")

onSnapshot(collection(db,"orders"),(snapshot)=>{

container.innerHTML=""

snapshot.forEach(doc=>{

let o=doc.data()

let html=`

<div class="order">

<h3>${o.customerName}</h3>

<p>📞 ${o.phone}</p>

<p>💰 ${o.total} جنيه</p>

<p>🚚 توصيل: ${o.delivery}</p>

<p>💳 الدفع: ${o.payment}</p>

<button class="call" onclick="call('${o.phone}')">اتصال</button>

<button class="map" onclick="map('${o.location}')">فتح الموقع</button>

</div>

`

container.innerHTML+=html

})

})

window.call=function(phone){
window.open("tel:"+phone)
}

window.map=function(link){
window.open(link)
}

</script>

</body>
</html>
